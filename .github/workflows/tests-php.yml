name: PHP Tests

on:
  push:
    branches:
      - main
    paths:
      - "**.php"
      - "composer.json"
      - ".github/test-matrix.json"
      - ".github/scripts/generate-matrix.sh"
      - ".github/scripts/get-woocommerce-stable-version.sh"
      - ".github/workflows/tests-php.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      php: ${{ steps.filter.outputs.php }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            php:
              - '**.php'
              - 'composer.json'
              - '.github/test-matrix.json'
              - '.github/scripts/generate-matrix.sh'
              - '.github/scripts/get-woocommerce-stable-version.sh'
              - '.github/workflows/tests-php.yml'

  resolve-node-dependencies:
    name: Resolve Node Dependencies
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.php == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4
        with:
          version: '10.8.0'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: |
            package.json
            pnpm-workspace.yaml

      - name: Generate pnpm lockfile
        run: pnpm install --lockfile-only --ignore-scripts

      - name: Upload pnpm lockfile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pnpm-lockfile
          path: pnpm-lock.yaml
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.php == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP with tools
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: "8.1"
          tools: composer, cs2pr, phpcs

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPCS
        run: composer run lint-report 2>/dev/null | sed -n '/<?xml/,/<\/checkstyle>/p' | cs2pr

  static-analysis:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.php == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP with tools
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: composer run phpstan

  # Smoke test - runs first on current stable versions to fail fast
  # Uses latest WP + WC to test what most users actually have
  smoke-test:
    name: Smoke Test (Latest Stable)
    runs-on: ubuntu-latest
    needs: [changes, lint, resolve-node-dependencies]
    if: needs.changes.outputs.php == 'true' || github.event_name == 'workflow_dispatch'

    outputs:
      success: ${{ steps.test.outcome == 'success' }}
      wp_version: ${{ steps.versions.outputs.wp }}
      wc_version: ${{ steps.versions.outputs.wc }}
      wc_url: ${{ steps.versions.outputs.wc_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get latest stable versions
        id: versions
        run: |
          # Get latest WordPress version
          WP_VERSION=$(curl -s https://api.wordpress.org/core/version-check/1.7/ | jq -r '.offers[0].version')
          echo "wp=$WP_VERSION" >> $GITHUB_OUTPUT
          echo "Latest WordPress: $WP_VERSION"

          # Get latest stable WooCommerce version + URL
          PLUGIN_INFO=$(curl -sg "https://api.wordpress.org/plugins/info/1.2/?action=plugin_information&request[slug]=woocommerce&request[fields][versions]=1")
          STABLE_VERSIONS=$(echo "$PLUGIN_INFO" | jq -r '.versions | keys[] | select(. != "trunk") | select(test("^[0-9]+(\\.[0-9]+)*$"))')
          WC_VERSION=""
          WC_URL=""
          for VERSION in $(echo "$STABLE_VERSIONS" | sort -V -r); do
            URL=$(echo "$PLUGIN_INFO" | jq -r --arg v "$VERSION" '.versions[$v]')
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              if curl -sfI "$URL" > /dev/null; then
                WC_VERSION="$VERSION"
                WC_URL="$URL"
                break
              fi
            fi
          done
          if [ -z "$WC_VERSION" ] || [ -z "$WC_URL" ]; then
            echo "Failed to resolve stable WooCommerce download URL" >&2
            exit 1
          fi
          echo "wc=$WC_VERSION" >> $GITHUB_OUTPUT
          echo "wc_url=$WC_URL" >> $GITHUB_OUTPUT
          echo "Latest WooCommerce: $WC_VERSION"
          echo "WooCommerce URL: $WC_URL"

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: '10.8.0'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php8.2-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-php8.2-

      # Cache Docker images for wp-env
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Cache Docker layers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-wp-latest-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-wp-latest-

      - name: Download pnpm lockfile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pnpm-lockfile

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Prefix PHP dependencies
        run: composer prefix-dependencies

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Download WooCommerce
        run: |
          mkdir -p /tmp/wc-plugin
          echo "Downloading WooCommerce from: ${{ steps.versions.outputs.wc_url }}"
          curl -sfL "${{ steps.versions.outputs.wc_url }}" -o /tmp/wc-plugin/woocommerce.zip
          unzip -qo /tmp/wc-plugin/woocommerce.zip -d /tmp/wc-plugin/
          rm /tmp/wc-plugin/woocommerce.zip
          ls -la /tmp/wc-plugin/woocommerce/
          echo "WooCommerce downloaded and extracted successfully"

      - name: Configure wp-env with latest versions
        run: |
          # Use latest stable versions (null = latest WordPress)
          cat > .wp-env.json << EOF
          {
            "core": null,
            "phpVersion": "8.2",
            "plugins": [
              "/tmp/wc-plugin/woocommerce",
              "."
            ],
            "config": {
              "WP_DEBUG": true,
              "SCRIPT_DEBUG": true,
              "WP_PHP_BINARY": "php",
              "WP_TESTS_EMAIL": "admin@example.org",
              "WP_TESTS_TITLE": "Test Blog"
            },
            "mappings": {}
          }
          EOF
          echo "Smoke test using WP ${{ steps.versions.outputs.wp }}, WC ${{ steps.versions.outputs.wc }}"

      - name: Start WordPress Environment
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: pnpm run wp-env start

      - name: Check versions
        run: |
          echo "=== Installed Versions ==="
          pnpm run wp-env run cli -- wp core version
          pnpm run wp-env run cli -- wp plugin list

      - name: Run PHPUnit tests
        id: test
        run: pnpm run test:unit:php

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: phpunit-results-smoke-test
          path: phpunit.xml
          retention-days: 7

  generate-matrix:
    name: Generate Test Matrix
    runs-on: ubuntu-latest
    needs: smoke-test
    if: needs.smoke-test.result == 'success' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read

    outputs:
      matrix: ${{ steps.matrix.outputs.result }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate matrix
        id: matrix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MATRIX="$(.github/scripts/generate-matrix.sh)"
          echo "result=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Generated matrix:"
          echo "$MATRIX" | jq .

  test-matrix:
    name: "Test (PHP ${{ matrix.php }}, WP ${{ matrix.wp }}, WC ${{ matrix.wc }})${{ matrix.source != 'pinned' && format(' [{0}]', matrix.source) || '' }}"
    runs-on: ubuntu-latest
    needs: [generate-matrix, resolve-node-dependencies]
    if: needs.generate-matrix.result == 'success'
    continue-on-error: ${{ matrix.experimental || false }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: '10.8.0'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-php${{ matrix.php }}-

      # Cache Docker images for wp-env
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Cache Docker layers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-wp-php${{ matrix.php }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-wp-php${{ matrix.php }}-

      - name: Download pnpm lockfile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pnpm-lockfile

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Prefix PHP dependencies
        run: composer prefix-dependencies

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Download WooCommerce
        run: |
          WC_URL='${{ matrix.wc_url }}'
          mkdir -p /tmp/wc-plugin
          echo "Downloading WooCommerce from: $WC_URL"
          curl -sfL "$WC_URL" -o /tmp/wc-plugin/woocommerce.zip
          unzip -qo /tmp/wc-plugin/woocommerce.zip -d /tmp/wc-plugin/
          rm /tmp/wc-plugin/woocommerce.zip
          ls -la /tmp/wc-plugin/woocommerce/
          echo "WooCommerce downloaded and extracted successfully"

      - name: Configure wp-env for matrix versions
        run: |
          # wp_core is either null (JSON null), a GitHub ref, or a zip URL
          WP_CORE='${{ matrix.wp_core }}'

          # Build the JSON value for "core"
          if [ "$WP_CORE" = "" ] || [ "$WP_CORE" = "null" ]; then
            WP_CORE_JSON="null"
          else
            WP_CORE_JSON="\"$WP_CORE\""
          fi

          cat > .wp-env.json << EOF
          {
            "core": $WP_CORE_JSON,
            "phpVersion": "${{ matrix.php }}",
            "plugins": [
              "/tmp/wc-plugin/woocommerce",
              "."
            ],
            "config": {
              "WP_DEBUG": true,
              "SCRIPT_DEBUG": true,
              "WP_PHP_BINARY": "php",
              "WP_TESTS_EMAIL": "admin@example.org",
              "WP_TESTS_TITLE": "Test Blog"
            },
            "mappings": {}
          }
          EOF
          echo "Testing with WP ${{ matrix.wp }}, WC ${{ matrix.wc }}, PHP ${{ matrix.php }}"
          echo "wp-env core: $WP_CORE"
          cat .wp-env.json

      - name: Start WordPress Environment
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: pnpm run wp-env start

      - name: Check versions
        run: |
          echo "=== Installed Versions ==="
          pnpm run wp-env run cli -- wp core version
          pnpm run wp-env run cli -- wp plugin list

      - name: Run PHPUnit tests
        run: pnpm run test:unit:php

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: phpunit-results-php${{ matrix.php }}-wp${{ matrix.wp }}-wc${{ matrix.wc }}
          path: phpunit.xml
          retention-days: 7

  coverage:
    name: Code Coverage (WP ${{ needs.smoke-test.outputs.wp_version }}, WC ${{ needs.smoke-test.outputs.wc_version }})
    runs-on: ubuntu-latest
    needs: [smoke-test, resolve-node-dependencies]
    if: needs.smoke-test.result == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: '10.8.0'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php8.2-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-php8.2-

      - name: Download pnpm lockfile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pnpm-lockfile

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Prefix PHP dependencies
        run: composer prefix-dependencies

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Download WooCommerce
        run: |
          mkdir -p /tmp/wc-plugin
          echo "Downloading WooCommerce from: ${{ needs.smoke-test.outputs.wc_url }}"
          curl -sfL "${{ needs.smoke-test.outputs.wc_url }}" -o /tmp/wc-plugin/woocommerce.zip
          unzip -qo /tmp/wc-plugin/woocommerce.zip -d /tmp/wc-plugin/
          rm /tmp/wc-plugin/woocommerce.zip
          ls -la /tmp/wc-plugin/woocommerce/
          echo "WooCommerce downloaded and extracted successfully"

      - name: Configure wp-env with latest versions
        run: |
          cat > .wp-env.json << 'EOF'
          {
            "core": null,
            "phpVersion": "8.2",
            "plugins": [
              "/tmp/wc-plugin/woocommerce",
              "."
            ],
            "config": {
              "WP_DEBUG": true,
              "SCRIPT_DEBUG": true,
              "WP_PHP_BINARY": "php",
              "WP_TESTS_EMAIL": "admin@example.org",
              "WP_TESTS_TITLE": "Test Blog"
            },
            "mappings": {}
          }
          EOF
          echo "Coverage using WP ${{ needs.smoke-test.outputs.wp_version }}, WC ${{ needs.smoke-test.outputs.wc_version }}"

      - name: Start WordPress Environment with Xdebug
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: pnpm run wp-env start --xdebug=coverage

      - name: Run PHPUnit with coverage
        run: pnpm run test:unit:php

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          files: coverage/clover.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  publish-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [changes, smoke-test, test-matrix]
    if: "!cancelled() && (needs.smoke-test.result == 'success' || github.event_name == 'workflow_dispatch')"

    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Download test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: phpunit-results-*
          path: test-results

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          files: "test-results/**/*.xml"
          comment_mode: always
          check_name: PHPUnit Test Results
