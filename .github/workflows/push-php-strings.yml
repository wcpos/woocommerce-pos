name: Push PHP Strings to Translations

on:
  push:
    branches:
      - main
    paths:
      - 'languages/woocommerce-pos.pot'
  workflow_dispatch:
    inputs:
      force:
        description: 'Push even if strings have not changed'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  trigger-translations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Push to translations-source-php branch
        id: push-source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SOURCE_REF="translations-source-php/${{ github.run_id }}-${{ github.run_attempt }}"

          mkdir -p /tmp/translations-out
          cp languages/woocommerce-pos.pot /tmp/translations-out/

          git checkout --orphan translations-source-php
          git rm -rf .
          cp /tmp/translations-out/woocommerce-pos.pot .
          git add woocommerce-pos.pot
          git commit -m "translation PHP source strings from ${{ github.sha }}"
          git push origin HEAD:"$SOURCE_REF"
          echo "ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"

          git checkout -f ${{ github.sha }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v2
        with:
          app-id: ${{ secrets.TRANSLATION_APP_ID }}
          private-key: ${{ secrets.TRANSLATION_APP_PRIVATE_KEY }}
          owner: wcpos
          repositories: translations

      - name: Notify translations repo
        run: |
          gh api repos/wcpos/translations/dispatches \
            -f event_type=update-free-pot \
            -f "client_payload[repo_name]=${{ github.event.repository.name }}" \
            -f "client_payload[ref]=${{ steps.push-source.outputs.ref }}" \
            -f "client_payload[pot_file]=woocommerce-pos.pot" \
            -f "client_payload[force]=${{ inputs.force || 'false' }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
