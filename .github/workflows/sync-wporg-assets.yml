name: Sync assets with wordpress.org

on:
  workflow_dispatch:

# Asset sync uses external SVN credentials to wordpress.org; the GITHUB_TOKEN only reads.
permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    name: Push assets to wporg
    steps:
        - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        - name: WordPress.org plugin asset/readme update
          uses: 10up/action-wordpress-plugin-asset-update@2480306f6f693672726d08b5917ea114cb2825f7 # stable
          env:
            SLUG: woocommerce-pos
            IGNORE_OTHER_FILES: true
            SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
            SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
