name: Deploy to Dev Site

on:
  push:
    branches: [main, next]
  workflow_dispatch:

# Deploy uses an external SSH key to a Hetzner host; the GITHUB_TOKEN only reads.
permissions:
  contents: read

jobs:
  deploy:
    # Stable lane (main) deploys to the dev sites below. The `next` lane only
    # deploys once the dev-next target is configured: set repo variable
    # DEV_NEXT_SITES (e.g. "dev-next-free dev-next-pro"). Until then `next` is skipped.
    if: ${{ github.ref_name != 'next' || vars.DEV_NEXT_SITES != '' }}
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: '11.1.1'

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: 👷 Build
        run: |
          pnpm install --lockfile-only --ignore-scripts
          pnpm install --frozen-lockfile
          composer prefix-dependencies
          composer install --no-dev
          pnpm build

      - name: 📦 Create deployment package
        run: |
          # Create staging directory
          mkdir -p deploy-staging
          
          # Copy files excluding build artifacts and source files
          # NOTE: vendor/ is REQUIRED - it contains PHP classes loaded via composer
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='packages/*/node_modules' \
            --exclude='tests' \
            --exclude='.gitignore' \
            --exclude='.editorconfig' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='pnpm-lock.yaml' \
            --exclude='pnpm-workspace.yaml' \
            --exclude='turbo.json' \
            --exclude='tsconfig.json' \
            --exclude='.eslintrc*' \
            --exclude='.prettierrc*' \
            --exclude='*.md' \
            --exclude='packages/*/src' \
            --exclude='packages/*/tsconfig.json' \
            --exclude='packages/*/package.json' \
            ./ deploy-staging/
          
          # Create tarball from staging directory
          cd deploy-staging
          tar -czf ../woocommerce-pos.tar.gz .
          cd ..

      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 213.239.218.130 >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to dev sites
        env:
          LANE: ${{ github.ref_name }}
          DEV_NEXT_SITES: ${{ vars.DEV_NEXT_SITES }}
        run: |
          TARBALL="woocommerce-pos-${GITHUB_RUN_ID}.tar.gz"

          # Target sites by lane: main -> stable dev sites; next -> dev-next sites
          # (from repo variable DEV_NEXT_SITES, e.g. "dev-next-free dev-next-pro").
          if [ "$LANE" = "next" ]; then
            SITES="$DEV_NEXT_SITES"
          else
            SITES="dev-free dev-pro"
          fi
          echo "Deploying lane '$LANE' to: $SITES"

          # Upload tarball with per-run name to avoid races
          scp -o StrictHostKeyChecking=yes woocommerce-pos.tar.gz "root@213.239.218.130:/tmp/${TARBALL}"

          ssh -o StrictHostKeyChecking=yes root@213.239.218.130 bash -s -- "${TARBALL}" "${SITES}" << 'EOF'
            TARBALL="$1"
            SITES="$2"
            set -e
            FAILED=0

            for SITE in $SITES; do
              if (
                set -e
                PLUGIN_DIR="/data/wordpress/${SITE}/html/wp-content/plugins/woocommerce-pos"

                rm -rf "$PLUGIN_DIR"
                mkdir -p "$PLUGIN_DIR"
                tar -xzf "/tmp/${TARBALL}" -C "$PLUGIN_DIR"

                chown -R 82:82 "$PLUGIN_DIR"
              ); then
                echo "✅ Deployed to ${SITE}.wcpos.com"
              else
                echo "❌ Deploy failed for ${SITE}.wcpos.com" >&2
                FAILED=1
                break
              fi
            done

            rm -f "/tmp/${TARBALL}"
            [ "$FAILED" -eq 0 ] || exit 1
          EOF
