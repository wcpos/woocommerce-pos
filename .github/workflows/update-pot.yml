name: Update POT file

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Setup PHP with tools
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '7.3'
          tools: composer, wp-cli

      - name: Install i18n-command
        run: |
          # The Composer bundled inside the wp-cli phar is too old to accept
          # GitHub's new (hyphenated) Actions token format, so `wp package install`
          # fails with 'github oauth token ... contains invalid characters'
          # (CVE-2026-45793) no matter how the token is supplied. Install the
          # command with the patched standalone Composer instead and load it via
          # --require below, bypassing the bundled Composer entirely. The git clone
          # is an anonymous public checkout and the dependencies come from Packagist,
          # so no GitHub token is needed.
          git clone --depth 1 --branch v2.2.13 https://github.com/wp-cli/i18n-command.git "$RUNNER_TEMP/i18n-command"
          composer install --no-dev --no-interaction --working-dir="$RUNNER_TEMP/i18n-command"

      - name: Update POT file
        run: wp --require="$RUNNER_TEMP/i18n-command/i18n-command.php" i18n make-pot . languages/woocommerce-pos.pot --domain=woocommerce-pos --slug=woocommerce-pos --package-name="WCPOS" --headers="{\"Report-Msgid-Bugs-To\":\"https://github.com/wcpos/woocommerce-pos/issues\"}" --skip-audit

      - name: Check for changes
        id: git-diff
        run: |
          git show HEAD:languages/woocommerce-pos.pot > old.pot 2>/dev/null || {
            echo "changes=true" >> "$GITHUB_OUTPUT"
            rm -f old.pot
            exit 0
          }

          tail -n +16 languages/woocommerce-pos.pot > new-trimmed.pot
          tail -n +16 old.pot > old-trimmed.pot

          if diff old-trimmed.pot new-trimmed.pot; then
            echo "No changes detected."
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

          rm -f old.pot new-trimmed.pot old-trimmed.pot

      - name: Generate GitHub App token
        if: steps.git-diff.outputs.changes == 'true'
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.WCPOS_BOT_APP_ID }}
          private-key: ${{ secrets.WCPOS_BOT_PRIVATE_KEY }}
          owner: wcpos
          repositories: woocommerce-pos

      - name: Create PR with updated POT file
        if: steps.git-diff.outputs.changes == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(i18n): update languages/woocommerce-pos.pot"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          branch: chore/update-pot-file
          base: main
          delete-branch: true
          title: "chore(i18n): update languages/woocommerce-pos.pot"
          body: |
            Automated POT file update.

            Generated by the Update POT file workflow.
          add-paths: |
            languages/woocommerce-pos.pot

