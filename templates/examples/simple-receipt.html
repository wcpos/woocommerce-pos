<!--
Simple Receipt — Logicless Example Template.

Demonstrates the logicless template engine which replaces
{{key.path}} placeholders with values from $receipt_data.

No PHP required — just HTML, CSS, and placeholder variables.
Logicless templates cannot loop over arrays (line items, payments),
so this format works best for simple order summaries.

Note: Logicless output passes through wp_kses_post, which strips
<style>, <head>, and document-level tags. Use inline styles only.

@see https://docs.wcpos.com/templates/receipt-data-reference
-->
<div style="box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: #333; padding: 24px; max-width: 400px; margin: 0 auto;">

	<div style="text-align: center; margin-bottom: 20px;">
		<div style="font-size: 20px; font-weight: 700; margin-bottom: 4px;">{{store.name}}</div>
		<div style="font-size: 12px; color: #666;">{{store.address_lines}}</div>
	</div>

	<hr style="border: none; border-top: 1px dashed #ccc; margin: 16px 0;">

	<div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px;">
		<span style="color: #555;">Order</span>
		<span>#{{meta.order_number}}</span>
	</div>
	<div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px;">
		<span style="color: #555;">Date</span>
		<span>{{meta.created_at_gmt}}</span>
	</div>
	<div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px;">
		<span style="color: #555;">Cashier</span>
		<span>{{cashier.name}}</span>
	</div>
	<div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px;">
		<span style="color: #555;">Customer</span>
		<span>{{customer.name}}</span>
	</div>

	<hr style="border: none; border-top: 1px dashed #ccc; margin: 16px 0;">

	<div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px;">
		<span style="color: #555;">Subtotal</span>
		<span>{{totals.subtotal_incl}}</span>
	</div>
	<div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px;">
		<span style="color: #555;">Tax</span>
		<span>{{totals.tax_total}}</span>
	</div>

	<div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 16px; padding-top: 8px; border-top: 2px solid #333; margin-top: 8px;">
		<span>Total</span>
		<span>{{totals.grand_total_incl}}</span>
	</div>

	<div style="text-align: center; margin-top: 24px; font-size: 12px; color: #999;">
		Thank you for your purchase!
	</div>

</div>
