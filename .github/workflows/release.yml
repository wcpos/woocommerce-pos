name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🔖 Check if version has changed
        id: check_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep -oP "Version:\s*\K\d+(\.\d+)*(-\w+)?(\.\d+)?" woocommerce-pos.php)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          git fetch --prune --unshallow
          LAST_TAG=$(git describe --tags --abbrev=0)
          echo "LAST_TAG=$LAST_TAG" >> "$GITHUB_ENV"
          if [[ "v$VERSION" == "$LAST_TAG" ]]; then
            echo "Version has not changed. Skipping release..."
            {
              echo "release=false"
              echo "create_release=false"
            } >> "$GITHUB_OUTPUT"
          elif gh release view "v$VERSION" --json isDraft >/dev/null 2>&1; then
            echo "Draft or published release v$VERSION already exists. Reusing it..."
            {
              echo "release=true"
              echo "create_release=false"
            } >> "$GITHUB_OUTPUT"
          else
            echo "Version has changed. Creating new release..."
            {
              echo "release=true"
              echo "create_release=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: 📦 Create Release
        if: steps.check_version.outputs.create_release == 'true'
        id: create_release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.VERSION }}
          release_name: Release v${{ env.VERSION }}
          draft: true
          prerelease: ${{ contains(env.VERSION, '-beta') }}

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: '11.1.1'

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: 👷 Build
        if: steps.check_version.outputs.release == 'true'
        run: |
          pnpm install --lockfile-only --ignore-scripts
          pnpm install --frozen-lockfile
          composer prefix-dependencies
          composer install --no-dev
          pnpm build

      - name: 📂 Sync to Temporary Directory
        if: steps.check_version.outputs.release == 'true'
        run: |
          mkdir temp_dir
          rsync -av --prune-empty-dirs --exclude-from='.distignore' ./ temp_dir/
      
      - name: 📦 Compress and Upload ZIP
        if: steps.check_version.outputs.release == 'true'
        run: |
          cd temp_dir
          zip -r ../woocommerce-pos.zip .
          cd ..
          gh release upload v${{ env.VERSION }} woocommerce-pos.zip --clobber
          rm -rf temp_dir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Request Release Notes from CodeRabbit
        if: steps.check_version.outputs.release == 'true'
        run: |
          EXISTING_ISSUE=$(gh issue list \
            --state open \
            --search "\"Generate release notes for v${{ env.VERSION }}\" in:title" \
            --json number \
            --jq '.[0].number // ""')

          if [[ -n "$EXISTING_ISSUE" ]]; then
            echo "Release notes issue already exists: #$EXISTING_ISSUE"
            exit 0
          fi

          # Prepend version context to the template
          {
            echo "**Release:** v${{ env.VERSION }}"
            echo "**Previous Tag:** ${{ env.LAST_TAG }}"
            echo ""
          } > /tmp/release_request.md
          cat .github/RELEASE_NOTES_REQUEST.md >> /tmp/release_request.md
          
          gh issue create \
            --title "📝 Generate release notes for v${{ env.VERSION }}" \
            --body-file /tmp/release_request.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
