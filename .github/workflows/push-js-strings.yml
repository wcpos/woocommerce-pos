name: Push JS Strings to Translations

on:
  push:
    branches:
      - main
    paths:
      - 'packages/settings/src/translations/locales/en/wp-admin-settings.json'
      - 'packages/analytics/src/translations/locales/en/wp-admin-analytics.json'
      - 'packages/template-gallery/src/translations/locales/en/wp-admin-template-gallery.json'
      - 'packages/template-editor/src/translations/locales/en/wp-admin-template-editor.json'
      - 'packages/consent/src/translations/locales/en/wp-admin-consent.json'
  workflow_dispatch:
    inputs:
      force:
        description: 'Push even if strings have not changed'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push-and-dispatch:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Push to translations-source branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/translations-out
          cp packages/settings/src/translations/locales/en/wp-admin-settings.json /tmp/translations-out/
          cp packages/analytics/src/translations/locales/en/wp-admin-analytics.json /tmp/translations-out/
          cp packages/template-gallery/src/translations/locales/en/wp-admin-template-gallery.json /tmp/translations-out/
          cp packages/template-editor/src/translations/locales/en/wp-admin-template-editor.json /tmp/translations-out/
          cp packages/consent/src/translations/locales/en/wp-admin-consent.json /tmp/translations-out/

          git checkout --orphan translations-source
          git rm -rf .
          cp /tmp/translations-out/*.json .
          git add .
          git commit -m "translation source strings from ${{ github.sha }}"
          git push -f origin translations-source

          git checkout ${{ github.sha }} -- .github

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v2
        with:
          app-id: ${{ secrets.TRANSLATION_APP_ID }}
          private-key: ${{ secrets.TRANSLATION_APP_PRIVATE_KEY }}
          owner: wcpos
          repositories: translations

      - name: Notify translations repo
        run: |
          gh api repos/wcpos/translations/dispatches \
            -f event_type=update-js-strings \
            -f "client_payload[repo_name]=${{ github.event.repository.name }}" \
            -f "client_payload[ref]=translations-source" \
            -f "client_payload[force]=${{ inputs.force || 'false' }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
