name: JS Tests

on:
  push:
    branches:
      - main
    paths:
      - "**.ts"
      - "**.tsx"
      - "**.js"
      - "**.jsx"
      - "package.json"
      - "packages/*/src/translations/locales/en/*.json"
      - ".github/scripts/test-push-js-strings.sh"
      - ".github/workflows/push-js-strings.yml"
      - ".github/workflows/tests-js.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**.ts"
      - "**.tsx"
      - "**.js"
      - "**.jsx"
      - "package.json"
      - "packages/*/src/translations/locales/en/*.json"
      - ".github/scripts/test-push-js-strings.sh"
      - ".github/workflows/push-js-strings.yml"
      - ".github/workflows/tests-js.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jest:
    name: Jest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate JS translation workflow
        run: bash .github/scripts/test-push-js-strings.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4
        with:
          version: '11.1.1'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pnpm install --lockfile-only --ignore-scripts
          pnpm install --frozen-lockfile

      - name: Run Jest tests
        run: pnpm run test:unit:js
