name: Update POT file

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          persist-credentials: false

      - name: Setup PHP with tools
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '7.3'
          tools: composer, wp-cli

      - name: Install dependencies
        run: |
          wp package install wp-cli/i18n-command:v2.2.13

      - name: Update POT file
        run: wp i18n make-pot . languages/woocommerce-pos.pot --domain=woocommerce-pos --slug=woocommerce-pos --package-name="WCPOS" --headers="{\"Report-Msgid-Bugs-To\":\"https://github.com/wcpos/woocommerce-pos/issues\"}" --skip-audit

      - name: Check for changes
        id: git-diff
        run: |
          git show HEAD:languages/woocommerce-pos.pot > old.pot 2>/dev/null || {
            echo "changes=true" >> "$GITHUB_OUTPUT"
            rm -f old.pot
            exit 0
          }

          tail -n +16 languages/woocommerce-pos.pot > new-trimmed.pot
          tail -n +16 old.pot > old-trimmed.pot

          if diff old-trimmed.pot new-trimmed.pot; then
            echo "No changes detected."
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

          rm -f old.pot new-trimmed.pot old-trimmed.pot

      - name: Generate GitHub App token
        if: steps.git-diff.outputs.changes == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.WCPOS_BOT_APP_ID }}
          private-key: ${{ secrets.WCPOS_BOT_PRIVATE_KEY }}
          owner: wcpos
          repositories: woocommerce-pos

      - name: Create PR with updated POT file
        if: steps.git-diff.outputs.changes == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(i18n): update languages/woocommerce-pos.pot"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          branch: chore/update-pot-file
          base: main
          delete-branch: true
          title: "chore(i18n): update languages/woocommerce-pos.pot"
          body: |
            Automated POT file update.

            Generated by the Update POT file workflow.
          add-paths: |
            languages/woocommerce-pos.pot

