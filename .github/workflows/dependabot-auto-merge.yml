name: Dependabot Auto-Merge
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    uses: wcpos/.github/.github/workflows/dependabot-auto-merge.yml@main
    secrets:
      PROJECT_BOT_APP_ID: ${{ secrets.PROJECT_BOT_APP_ID }}
      PROJECT_BOT_PRIVATE_KEY: ${{ secrets.PROJECT_BOT_PRIVATE_KEY }}
